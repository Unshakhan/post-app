<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Profile — Post App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg, #f0f0f5);
      color: var(--text-primary, #1a1a1a);
      min-height: 100vh;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ══════════════════════════════
       NAVBAR
    ══════════════════════════════ */
    #profileNav {
      background-image: linear-gradient(135deg, rgb(176,0,18) 0%, rgb(255,97,100) 50%, rgb(255,255,196) 100%);
      height: 70px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(176,0,18,0.2);
      padding: 0 24px;
      gap: 16px;
    }
    body.dark-mode #profileNav {
      background-image: linear-gradient(135deg, #6b0009 0%, #aa2030 50%, #cc3040 100%);
    }
    .back-btn {
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.5);
      color: white;
      border-radius: 10px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .back-btn:hover { background: rgba(255,255,255,0.3); color: white; transform: translateX(-3px); }
    .nav-title { color: white; font-weight: 700; font-size: 17px; }
    .theme-btn {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      width: 38px; height: 38px;
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .theme-btn:hover { background: rgba(255,255,255,0.28); transform: rotate(20deg) scale(1.1); }

    /* ══════════════════════════════
       LAYOUT — sidebar + content
    ══════════════════════════════ */
    .profile-layout {
      display: flex;
      min-height: calc(100vh - 70px);
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
      gap: 24px;
      align-items: flex-start;
    }

    /* ══════════════════════════════
       SIDEBAR
    ══════════════════════════════ */
    .profile-sidebar {
      width: 280px;
      flex-shrink: 0;
      position: sticky;
      top: 94px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Avatar card */
    .avatar-card {
      background: var(--bg-card, #fff);
      border-radius: 20px;
      border: 1px solid var(--border, #e8e8e8);
      box-shadow: var(--shadow-card, 0 4px 20px rgba(0,0,0,0.07));
      overflow: hidden;
      transition: background 0.4s ease;
    }
    .avatar-cover {
      height: 80px;
      background: linear-gradient(135deg, rgb(176,0,18), rgb(255,97,100), rgb(255,255,196));
    }
    body.dark-mode .avatar-cover {
      background: linear-gradient(135deg, #3a0008, #6b0009, #aa2030);
    }
    .avatar-body { padding: 0 20px 20px; }
    .avatar-wrap {
      margin-top: -36px;
      margin-bottom: 12px;
    }
    .avatar-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 3px solid var(--bg-card, #fff);
      background: linear-gradient(135deg, rgb(176,0,18), rgb(255,97,100));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      color: white;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(176,0,18,0.25);
      transition: transform 0.3s ease;
    }
    .avatar-circle:hover { transform: scale(1.05); }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
    .profile-fullname {
      font-size: 17px;
      font-weight: 800;
      color: var(--text-primary, #1a1a1a);
    }
    .profile-joined {
      font-size: 11px;
      color: var(--text-muted, #999);
      margin-top: 2px;
    }

    /* Stats mini */
    .stats-mini {
      display: flex;
      gap: 0;
      margin-top: 14px;
      background: var(--bg, #f0f0f5);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border, #e8e8e8);
    }
    .stat-mini-item {
      flex: 1;
      padding: 10px 6px;
      text-align: center;
      position: relative;
    }
    .stat-mini-item + .stat-mini-item::before {
      content: '';
      position: absolute;
      left: 0; top: 15%; bottom: 15%;
      width: 1px;
      background: var(--border, #e8e8e8);
    }
    .stat-mini-num {
      font-size: 18px;
      font-weight: 800;
      color: rgb(176,0,18);
      line-height: 1;
    }
    body.dark-mode .stat-mini-num { color: #ff8080; }
    .stat-mini-label {
      font-size: 9px;
      color: var(--text-muted, #999);
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
    }

    /* Nav menu */
    .sidebar-nav {
      background: var(--bg-card, #fff);
      border-radius: 20px;
      border: 1px solid var(--border, #e8e8e8);
      box-shadow: var(--shadow-card, 0 4px 20px rgba(0,0,0,0.07));
      overflow: hidden;
      transition: background 0.4s ease;
    }
    .nav-item-btn {
      width: 100%;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 13px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary, #555);
      transition: all 0.2s ease;
      position: relative;
      text-align: left;
      border-bottom: 1px solid var(--border, #f0f0f0);
    }
    .nav-item-btn:last-child { border-bottom: none; }
    .nav-item-btn:hover {
      background: rgba(176,0,18,0.04);
      color: rgb(176,0,18);
      padding-left: 24px;
    }
    .nav-item-btn.active {
      background: linear-gradient(135deg, rgba(176,0,18,0.08), rgba(255,97,100,0.05));
      color: rgb(176,0,18);
      border-right: 3px solid rgb(176,0,18);
    }
    body.dark-mode .nav-item-btn.active {
      background: rgba(176,0,18,0.15);
      color: #ff8080;
      border-right-color: #ff6060;
    }
    body.dark-mode .nav-item-btn:hover { color: #ff8080; }
    .nav-icon { font-size: 18px; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto;
      background: rgb(176,0,18);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      min-width: 22px;
      text-align: center;
    }
    body.dark-mode .nav-badge { background: #aa2030; }

    /* ══════════════════════════════
       MAIN CONTENT
    ══════════════════════════════ */
    .profile-main {
      flex: 1;
      min-width: 0;
    }

    .content-panel {
      display: none;
      animation: panelFade 0.35s ease both;
    }
    .content-panel.active { display: block; }
    @keyframes panelFade {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-header {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-primary, #1a1a1a);
      margin-bottom: 18px;
      padding-left: 12px;
      border-left: 4px solid rgb(176,0,18);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Post mini card ── */
    .post-mini-card {
      background: var(--bg-card, #fff);
      border-radius: 16px;
      border: 1px solid var(--border, #e8e8e8);
      box-shadow: var(--shadow-card, 0 2px 12px rgba(0,0,0,0.06));
      margin-bottom: 16px;
      overflow: hidden;
      transition: all 0.25s ease;
      animation: cardSlideUp 0.4s cubic-bezier(.175,.885,.32,1.275) both;
    }
    .post-mini-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.12);
    }
    body.dark-mode .post-mini-card {
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .post-mini-cover {
      height: 110px;
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .post-mini-cover-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: flex-end;
      padding: 10px 14px;
    }
    .post-mini-title-text {
      color: white;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
    }
    .post-mini-body { padding: 12px 16px; }
    .post-mini-desc {
      font-size: 12.5px;
      color: var(--text-secondary, #666);
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-mini-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 12px;
      color: var(--text-muted, #999);
      flex-wrap: wrap;
    }
    .post-mini-meta span { display: flex; align-items: center; gap: 4px; }
    .post-mini-time {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted, #bbb);
    }

    /* ── Like detail card ── */
    .like-detail-card {
      background: var(--bg-card, #fff);
      border-radius: 14px;
      border: 1px solid var(--border, #e8e8e8);
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-card, 0 2px 8px rgba(0,0,0,0.05));
      transition: all 0.2s ease;
      animation: cardSlideUp 0.4s cubic-bezier(.175,.885,.32,1.275) both;
    }
    .like-detail-card:hover {
      transform: translateX(4px);
      border-color: rgba(176,0,18,0.3);
      box-shadow: 0 4px 16px rgba(176,0,18,0.08);
    }
    .like-post-thumb {
      width: 60px; height: 60px;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
      border: 2px solid var(--border, #e8e8e8);
    }
    .like-post-info { flex: 1; min-width: 0; }
    .like-post-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary, #1a1a1a);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .like-post-author {
      font-size: 11px;
      color: var(--text-muted, #999);
      margin-top: 3px;
    }
    .like-post-time {
      font-size: 11px;
      color: var(--text-muted, #bbb);
      margin-top: 4px;
    }
    .like-heart { font-size: 22px; flex-shrink: 0; }

    /* ── Delete log card ── */
    .del-log-card {
      background: var(--bg-card, #fff);
      border-radius: 14px;
      border: 1px solid var(--border, #e8e8e8);
      border-left: 4px solid rgb(255,97,100);
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-card, 0 2px 8px rgba(0,0,0,0.05));
      animation: cardSlideUp 0.4s cubic-bezier(.175,.885,.32,1.275) both;
      transition: background 0.4s ease;
    }
    .del-log-icon { font-size: 26px; flex-shrink: 0; }
    .del-log-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary, #1a1a1a);
    }
    .del-log-time {
      font-size: 11px;
      color: var(--text-muted, #999);
      margin-top: 3px;
    }

    /* ── Saved card ── */
    .saved-card {
      background: var(--bg-card, #fff);
      border-radius: 14px;
      border: 1px solid var(--border, #e8e8e8);
      border-left: 4px solid rgb(176,0,18);
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-card, 0 2px 8px rgba(0,0,0,0.05));
      transition: all 0.2s ease;
      animation: cardSlideUp 0.4s cubic-bezier(.175,.885,.32,1.275) both;
    }
    .saved-card:hover {
      transform: translateX(4px);
      box-shadow: 0 4px 16px rgba(176,0,18,0.08);
    }
    .saved-thumb {
      width: 56px; height: 56px;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }
    .unsave-btn {
      background: rgba(176,0,18,0.08);
      border: 1px solid rgba(176,0,18,0.2);
      color: rgb(176,0,18);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
    }
    .unsave-btn:hover { background: rgba(176,0,18,0.15); }

    /* ── Comment card ── */
    .comment-card {
      background: var(--bg-card, #fff);
      border-radius: 14px;
      border: 1px solid var(--border, #e8e8e8);
      border-left: 4px solid #1565c0;
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-card, 0 2px 8px rgba(0,0,0,0.05));
      animation: cardSlideUp 0.4s cubic-bezier(.175,.885,.32,1.275) both;
      transition: background 0.4s ease;
    }
    .comment-text {
      font-size: 13px;
      color: var(--text-primary, #1a1a1a);
      font-style: italic;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .comment-post-ref {
      font-size: 11px;
      color: var(--text-muted, #999);
    }
    .comment-time {
      font-size: 11px;
      color: var(--text-muted, #bbb);
      margin-top: 4px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 52px 24px;
      color: var(--text-muted, #999);
      background: var(--bg-card, #fff);
      border-radius: 20px;
      border: 1px solid var(--border, #e8e8e8);
    }
    .empty-icon { font-size: 54px; margin-bottom: 14px; }
    .empty-text { font-size: 15px; font-weight: 600; color: var(--text-secondary, #777); }
    .empty-sub  { font-size: 13px; margin-top: 6px; }

    /* ── Spinner ── */
    .spin-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      gap: 14px;
      color: var(--text-muted, #999);
      flex-direction: column;
    }
    .spinner-ring {
      width: 44px; height: 44px;
      border: 4px solid var(--border, #f0f0f0);
      border-top: 4px solid rgb(176,0,18);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    body.dark-mode .spinner-ring { border-color: #2a2a38; border-top-color: #ff6060; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .profile-layout { flex-direction: column; padding: 16px 12px; }
      .profile-sidebar { width: 100%; position: static; }
      .sidebar-nav { display: flex; overflow-x: auto; border-radius: 14px; }
      .nav-item-btn {
        border-bottom: none;
        border-right: 1px solid var(--border, #f0f0f0);
        white-space: nowrap;
        flex-direction: column;
        gap: 4px;
        padding: 12px 16px;
        font-size: 11px;
      }
      .nav-item-btn.active { border-right: 1px solid var(--border, #f0f0f0); border-bottom: 3px solid rgb(176,0,18); }
      .nav-badge { display: none; }
    }
    .avatar-circle {
  cursor: pointer;
  transition: all 0.3s ease;
}
.avatar-circle:hover {
  transform: scale(1.08);
  box-shadow: 0 0 0 6px rgba(176,0,18,0.3);
}
  </style>
</head>
<body>

  <!-- Toast -->
  <div id="toastContainer" style="position:fixed;bottom:24px;right:24px;z-index:99999;display:flex;flex-direction:column;gap:10px;pointer-events:none;"></div>

  <!-- Navbar -->
  <nav id="profileNav">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <span class="nav-title">My Profile</span>
    <div style="margin-left:auto;display:flex;gap:10px;align-items:center;">
      <button class="theme-btn" id="profileThemeBtn" onclick="toggleTheme()">☀️</button>
    </div>
  </nav>

  <!-- Loading -->
  <div id="pageLoading" class="spin-wrap" style="margin-top:60px;">
    <div class="spinner-ring"></div>
    <span>Loading your profile...</span>
  </div>

  <!-- Main Layout -->
  <div class="profile-layout" id="profileLayout" style="display:none;">

    <!-- ══ SIDEBAR ══ -->
    <aside class="profile-sidebar">

      <!-- Avatar Card -->
      <div class="avatar-card">
        <div class="avatar-cover"></div>
        <div class="avatar-body">
          <div class="avatar-wrap">
<div class="avatar-circle" id="sideAvatar" 
     style="cursor:pointer;" 
     onclick="window.changeProfileAvatar()" 
     title="Click to change avatar">
  ?
</div>
          </div>
          <div class="profile-fullname" id="sideFullName">—</div>
          <div class="profile-joined"   id="sideJoined">—</div>
          <div class="stats-mini">
            <div class="stat-mini-item">
              <div class="stat-mini-num"   id="miniPosts">0</div>
              <div class="stat-mini-label">Posts</div>
            </div>
            <div class="stat-mini-item">
              <div class="stat-mini-num"   id="miniLikes">0</div>
              <div class="stat-mini-label">Likes</div>
            </div>
            <div class="stat-mini-item">
              <div class="stat-mini-num"   id="miniComments">0</div>
              <div class="stat-mini-label">Comments</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Nav Menu -->
      <nav class="sidebar-nav">
        <button class="nav-item-btn active" onclick="showPanel('all'    , this)"><span class="nav-icon">📝</span> All Posts    <span class="nav-badge" id="badgePosts">0</span></button>
        <button class="nav-item-btn"        onclick="showPanel('likes'  , this)"><span class="nav-icon">❤️</span> Liked Posts  <span class="nav-badge" id="badgeLikes">0</span></button>
        <button class="nav-item-btn"        onclick="showPanel('saved'  , this)"><span class="nav-icon">🔖</span> Saved        <span class="nav-badge" id="badgeSaved">0</span></button>
        <button class="nav-item-btn"        onclick="showPanel('comments', this)"><span class="nav-icon">💬</span> My Comments  <span class="nav-badge" id="badgeComments">0</span></button>
        <button class="nav-item-btn" onclick="showPanel('notifs', this)">
  <span class="nav-icon">🔔</span> Notifications
  <span class="nav-badge" id="badgeNotifs">0</span>
</button>
        <button class="nav-item-btn"        onclick="showPanel('deleted', this)"><span class="nav-icon">🗑️</span> Deleted Posts<span class="nav-badge" id="badgeDeleted">0</span></button>
      </nav>

    </aside>

    <!-- ══ MAIN ══ -->
    <main class="profile-main">

      <!-- All Posts -->
   <div class="content-panel active" id="panel-all">
  <div class="panel-header">📝 All My Posts</div>
  <div id="allPostsWrap" style="
    max-height: 75vh;
    overflow-y: auto;
    padding-right: 6px;
    scrollbar-width: thin;
    scrollbar-color: rgb(176,0,18) transparent;
  ">
    <div class="spin-wrap"><div class="spinner-ring"></div></div>
  </div>
</div>
      <!-- Liked Posts -->
      <div class="content-panel" id="panel-likes">
        <div class="panel-header">❤️ Posts I Liked</div>
        <div id="likedPostsWrap" style="
    max-height: 75vh;
    overflow-y: auto;
    padding-right: 6px;
    scrollbar-width: thin;
    scrollbar-color: rgb(176,0,18) transparent;
  "><div class="spin-wrap"><div class="spinner-ring"></div></div></div>
      </div>

      <!-- Saved Posts -->
      <div class="content-panel" id="panel-saved">
        <div class="panel-header">🔖 Saved Posts</div>
        <div id="savedPostsWrap" style="
    max-height: 75vh;
    overflow-y: auto;
    padding-right: 6px;
    scrollbar-width: thin;
    scrollbar-color: rgb(176,0,18) transparent;
  "><div class="spin-wrap"><div class="spinner-ring"></div></div></div>
      </div>

      <!-- My Comments -->
      <div class="content-panel" id="panel-comments">
        <div class="panel-header">💬 My Comments</div>
        <div id="myCommentsWrap" style="
    max-height: 75vh;
    overflow-y: auto;
    padding-right: 6px;
    scrollbar-width: thin;
    scrollbar-color: rgb(176,0,18) transparent;
  "><div class="spin-wrap"><div class="spinner-ring"></div></div></div>
      </div>
<!-- Notifications -->
<div class="content-panel" id="panel-notifs">
  <div class="panel-header">🔔 My Notifications</div>
  <div id="profileNotifsWrap">
    <div class="spin-wrap"><div class="spinner-ring"></div></div>
  </div>
</div>
      <!-- Deleted Posts -->
      <div class="content-panel" id="panel-deleted">
        <div class="panel-header">🗑️ Deleted Posts</div>
        <div id="deletedPostsWrap" style="
    max-height: 75vh;
    overflow-y: auto;
    padding-right: 6px;
    scrollbar-width: thin;
    scrollbar-color: rgb(176,0,18) transparent;
  "><div class="spin-wrap"><div class="spinner-ring"></div></div></div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import supabase from "./supabase.js";

    /* ══ Dark Mode ══ */
    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('profileThemeBtn').textContent = isDark ? '🌙' : '☀️';
    }
    window.toggleTheme = toggleTheme;
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-mode');
      document.getElementById('profileThemeBtn').textContent = '🌙';
    }

    /* ══ Toast ══ */
    function showToast(type, title, msg, dur = 3000) {
      const c = document.getElementById('toastContainer');
      const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
      const t = document.createElement('div');
      t.className = `toast-item ${type}`;
      t.innerHTML = `<span class="toast-icon">${icons[type]||'💬'}</span>
        <div class="toast-body"><div class="toast-title">${title}</div>${msg?`<div class="toast-msg">${msg}</div>`:''}</div>
        <button class="toast-close" onclick="this.parentElement.remove()">✕</button>
        <div class="toast-progress" style="animation-duration:${dur}ms"></div>`;
      c.appendChild(t);
      setTimeout(() => { t.style.animation='toastOut 0.35s ease forwards'; setTimeout(()=>t.remove(),350); }, dur);
    }

    /* ══ Strip HTML ══ */
    const strip = h => { const d=document.createElement('div'); d.innerHTML=h||''; return d.textContent||''; };

    /* ══ Format time ══ */
    const fmtTime = d => new Date(d).toLocaleString('en-PK', { dateStyle:'medium', timeStyle:'short' });

    /* ══ Panel switcher ══ */
    window.showPanel = function(name, btn) {
      document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`panel-${name}`).classList.add('active');
      btn.classList.add('active');
    };

    /* ══ Auth Guard — only own profile ══ */
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'INITIAL_SESSION') {
        if (!session) { window.location.href = './form.html'; return; }
        await loadProfile(session.user.id);
      }
      if (event === 'SIGNED_OUT') { window.location.href = './form.html'; }
    });

    /* ══ MAIN LOAD ══ */
   async function loadProfile(uid) {
  try {
    // Fetch all data
    const [
      profileRes,
      postsRes,
      likesRes,
      commentsRes,
      delLogsRes,
      savedRes,
      notifRes
    ] = await Promise.all([
      supabase.from('profiles').select('*').eq('id', uid).single(),
      supabase.from('post_crud').select('*').eq('user_id', uid).order('created_at', { ascending: false }),
      supabase.from('likes').select('post_id').eq('user_id', uid),
      supabase.from('comments').select('*').eq('user_id', uid).order('created_at', { ascending: false }),
      supabase.from('deleted_posts_log').select('*').eq('user_id', uid).order('deleted_at', { ascending: false }),
      supabase.from('saved_posts').select('post_id').eq('user_id', uid),
      supabase.from('notifications').select('*').eq('user_id', uid).order('created_at', { ascending: false }).limit(50)
    ]);

    const profile = profileRes.data;
    const posts = postsRes.data || [];
    const myLikes = likesRes.data || [];
    const myComments = commentsRes.data || [];
    const delLogs = delLogsRes.data || [];
    const savedRows = savedRes.data || [];
    const notifRows = notifRes.data || [];

    // Name & Avatar
    const firstName = profile?.first_name || posts[0]?.first_name || '';
    const lastName  = profile?.last_name  || posts[0]?.last_name  || '';
    const fullName  = `${firstName} ${lastName}`.trim() || 'You';

    // Get latest avatar
    const { data: avatarData } = await supabase
      .from('post_crud')
      .select('avatar_url')
      .eq('user_id', uid)
      .order('created_at', { ascending: false })
      .limit(1)
      .single();

    const avatarUrl = avatarData?.avatar_url || '';

    const joined = profile?.created_at 
      ? `Joined ${new Date(profile.created_at).toLocaleDateString('en-PK', {year:'numeric', month:'long'})}`
      : 'Joined recently';

    // Likes received count
    const postIds = posts.map(p => p.id);
    const { data: likesReceived } = postIds.length 
      ? await supabase.from('likes').select('post_id').in('post_id', postIds)
      : { data: [] };

    const postCount = posts.length;
    const likeCount = likesReceived.length;
    const commentCount = myComments.length;
    const likedCount = myLikes.length;
    const delCount = delLogs.length;
    const savedCount = savedRows.length;

    // Sidebar
    const av = document.getElementById('sideAvatar');
    if (avatarUrl) {
      av.innerHTML = `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="avatar">`;
    } else {
      av.textContent = firstName.charAt(0).toUpperCase() || '?';
    }

    document.getElementById('sideFullName').textContent = fullName;
    document.getElementById('sideJoined').textContent = joined;
    document.getElementById('miniPosts').textContent = postCount;
    document.getElementById('miniLikes').textContent = likeCount;
    document.getElementById('miniComments').textContent = commentCount;

    document.getElementById('badgePosts').textContent = postCount;
    document.getElementById('badgeLikes').textContent = likedCount;
    document.getElementById('badgeSaved').textContent = savedCount;
    document.getElementById('badgeComments').textContent = commentCount;
    document.getElementById('badgeDeleted').textContent = delCount;
    document.getElementById('badgeNotifs').textContent = notifRows.filter(n => !n.is_read).length;

    // Show content
    document.getElementById('pageLoading').style.display = 'none';
    document.getElementById('profileLayout').style.display = 'flex';

    // Render all panels
    renderAllPosts(posts, likesReceived, uid);
    renderLikedPosts(myLikes);
    renderSaved(savedRows, uid);
    renderComments(myComments);
    renderDeleted(delLogs);
    renderProfileNotifs(notifRows);

  } catch (err) {
    console.error("Profile load error:", err);
    document.getElementById('pageLoading').innerHTML = `<p style="color:red;">Error loading profile. Please refresh.</p>`;
  }
}
    /* ══ ALL POSTS ══ */
    function renderAllPosts(posts, likesReceived, uid) {
      const wrap = document.getElementById('allPostsWrap');
      if (!posts.length) { wrap.innerHTML = emptyState('📭','No posts yet','Start creating your first post!'); return; }

      wrap.innerHTML = '';
      posts.forEach((p, i) => {
        const pLikes = likesReceived.filter(l => l.post_id == p.id).length;
        const div = document.createElement('div');
        div.className = 'post-mini-card';
        div.style.animationDelay = `${i * 0.06}s`;
        div.innerHTML = `
          <div class="post-mini-cover" style="background-image:url('${p.image_url}');">
            <div class="post-mini-cover-overlay">
              <div class="post-mini-title-text">${strip(p.title).slice(0,70)}</div>
            </div>
          </div>
          <div class="post-mini-body">
            <div class="post-mini-desc">${strip(p.description)}</div>
            <div class="post-mini-meta">
              <span>❤️ ${pLikes}</span>
              <span class="post-mini-time">🕒 ${fmtTime(p.created_at)}</span>
            </div>
          </div>`;
        wrap.appendChild(div);
      });
    }
/* ══ PROFILE NOTIFICATIONS ══ */
function renderProfileNotifs(notifs) {
  const wrap = document.getElementById('profileNotifsWrap');
  if (!notifs.length) {
    wrap.innerHTML = emptyState('🔔','No notifications yet','Likes and comments will appear here.');
    return;
  }

  wrap.innerHTML = '';
  notifs.forEach((n, i) => {
    const div = document.createElement('div');
    div.className = `like-detail-card`;
    div.style.cssText = `animation-delay:${i*0.05}s; border-left:4px solid ${n.type==='like'?'#B00012':'#1565c0'};
      ${!n.is_read ? 'background:rgba(176,0,18,0.04);' : ''}`;
    div.innerHTML = `
      <div style="font-size:26px;flex-shrink:0;">${n.type==='like'?'❤️':'💬'}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;color:var(--text-primary,#1a1a1a);">${n.message}</div>
        <div style="font-size:11px;color:var(--text-muted,#999);margin-top:3px;">
          📝 ${strip(n.post_title||'').slice(0,45)}
        </div>
        <div style="font-size:11px;color:var(--text-muted,#bbb);margin-top:4px;">
          🕒 ${fmtTime(n.created_at)}
        </div>
      </div>
      ${!n.is_read ? '<div style="width:8px;height:8px;border-radius:50%;background:rgb(176,0,18);flex-shrink:0;"></div>' : ''}
    `;
    wrap.appendChild(div);
  });
}
    /* ══ LIKED POSTS ══ */
    async function renderLikedPosts(myLikes) {
      const wrap = document.getElementById('likedPostsWrap');
      if (!myLikes.length) { wrap.innerHTML = emptyState('🤍','No liked posts yet','Like posts to see them here!'); return; }

      const ids = myLikes.map(l => l.post_id);
      const { data: posts } = await supabase.from('post_crud').select('*').in('id', ids);

      wrap.innerHTML = '';
      if (!posts||!posts.length) { wrap.innerHTML = emptyState('🤍','Posts not found','They may have been deleted.'); return; }

      posts.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'like-detail-card';
        div.style.animationDelay = `${i * 0.06}s`;
        div.innerHTML = `
          <div class="like-post-thumb" style="background-image:url('${p.image_url}');"></div>
          <div class="like-post-info">
            <div class="like-post-title">${strip(p.title).slice(0,60)}</div>
            <div class="like-post-author">by ${p.first_name||''} ${p.last_name||''}</div>
            <div class="like-post-time">🕒 ${fmtTime(p.created_at)}</div>
          </div>
          <span class="like-heart">❤️</span>`;
        wrap.appendChild(div);
      });
    }

    /* ══ SAVED POSTS ══ */
    async function renderSaved(savedRows, uid) {
      const wrap = document.getElementById('savedPostsWrap');
      if (!savedRows.length) { wrap.innerHTML = emptyState('🔖','No saved posts','Bookmark posts to find them here!'); return; }

      const ids = savedRows.map(r => r.post_id);
      const { data: posts } = await supabase.from('post_crud').select('*').in('id', ids);

      wrap.innerHTML = '';
      if (!posts||!posts.length) { wrap.innerHTML = emptyState('🔖','Saved posts not found','They may have been deleted.'); return; }

      posts.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'saved-card';
        div.style.animationDelay = `${i * 0.06}s`;
        div.innerHTML = `
          <div class="saved-thumb" style="background-image:url('${p.image_url}');"></div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:700;color:var(--text-primary,#1a1a1a);
                        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
              ${strip(p.title).slice(0,55)}
            </div>
            <div style="font-size:11px;color:var(--text-muted,#999);margin-top:3px;">
              by ${p.first_name||''} ${p.last_name||''} · ${fmtTime(p.created_at)}
            </div>
          </div>
          <button class="unsave-btn" onclick="unsavePost('${p.id}', '${uid}', this)">
            🔖 Unsave
          </button>`;
        wrap.appendChild(div);
      });
    }

    /* ══ MY COMMENTS ══ */
    async function renderComments(comments) {
      const wrap = document.getElementById('myCommentsWrap');
      if (!comments.length) { wrap.innerHTML = emptyState('💬','No comments yet','Join the conversation!'); return; }

      // Fetch post titles for context
      const postIds = [...new Set(comments.map(c => c.post_id))];
      const { data: posts } = await supabase.from('post_crud').select('id,title').in('id', postIds);
      const postMap = {};
      (posts||[]).forEach(p => { postMap[p.id] = strip(p.title).slice(0,50); });

      wrap.innerHTML = '';
      comments.forEach((c, i) => {
        const div = document.createElement('div');
        div.className = 'comment-card';
        div.style.animationDelay = `${i * 0.06}s`;
        div.innerHTML = `
          <div class="comment-text">"${c.comment}"</div>
          <div class="comment-post-ref">💬 On post: <strong>${postMap[c.post_id]||'Deleted post'}</strong></div>
          <div class="comment-time">🕒 ${fmtTime(c.created_at)}</div>`;
        wrap.appendChild(div);
      });
    }
/* ══ NOTIFICATIONS ══ */
async function loadProfileNotifications(uid) {
  const { data: notifs } = await supabase
    .from("notifications")
    .select("*")
    .eq("user_id", uid)
    .order("created_at", { ascending: false })
    .limit(50);

  return notifs || [];
}
    /* ══ DELETED POSTS ══ */
    function renderDeleted(logs) {
      const wrap = document.getElementById('deletedPostsWrap');
      if (!logs.length) { wrap.innerHTML = emptyState('🗑️','No deleted posts','Your deleted posts will appear here.'); return; }

      wrap.innerHTML = '';
      logs.forEach((d, i) => {
        const div = document.createElement('div');
        div.className = 'del-log-card';
        div.style.animationDelay = `${i * 0.06}s`;
        div.innerHTML = `
          <span class="del-log-icon">🗑️</span>
          <div>
            <div class="del-log-title">${strip(d.title).slice(0,70)||'Untitled post'}</div>
            <div class="del-log-time">🕒 Deleted: ${fmtTime(d.deleted_at)}</div>
          </div>`;
        wrap.appendChild(div);
      });
    }

    /* ══ UNSAVE ══ */
    window.unsavePost = async function(postId, uid, btn) {
      const { error } = await supabase.from('saved_posts')
        .delete().eq('post_id', postId).eq('user_id', uid);
      if (error) { showToast('error','Failed to unsave'); return; }
      btn.closest('.saved-card').style.animation = 'toastOut 0.3s ease forwards';
      setTimeout(() => btn.closest('.saved-card').remove(), 300);
      showToast('success','Removed from saved 🔖');
      // Update badge
      const badge = document.getElementById('badgeSaved');
      badge.textContent = Math.max(0, parseInt(badge.textContent) - 1);
    };

    /* ══ EMPTY STATE ══ */
    function emptyState(icon, title, sub) {
      return `<div class="empty-state">
        <div class="empty-icon">${icon}</div>
        <div class="empty-text">${title}</div>
        <div class="empty-sub">${sub}</div>
      </div>`;
    }
    /* ── Change Avatar on Profile Page ── */
/* ── Change Avatar Function ── */
window.changeProfileAvatar = async function() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  
  input.onchange = async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    if (file.size > 5 * 1024 * 1024) {
      showToast('error', 'File too large', 'Maximum 5MB allowed');
      return;
    }

    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
      showToast('warning', 'Login Required', 'Please login first');
      return;
    }

    showToast('info', 'Uploading...', 'Please wait', 8000);

    const fileName = `${user.id}-${Date.now()}-${file.name}`;
    
    const { error: uploadError } = await supabase.storage
      .from('avatars')
      .upload(fileName, file, { cacheControl: '3600', upsert: true });

    if (uploadError) {
      console.error(uploadError);
      showToast('error', 'Upload Failed', uploadError.message);
      return;
    }

    const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(fileName);
    const avatarUrl = urlData.publicUrl;

    // Update avatar in all user's posts
    const { error: updateError } = await supabase
      .from('post_crud')
      .update({ avatar_url: avatarUrl })
      .eq('user_id', user.id);

    if (updateError) {
      console.error(updateError);
      showToast('error', 'Update Failed', 'RLS error - check policies');
      return;
    }

    // Update UI
    const av = document.getElementById('sideAvatar');
    av.innerHTML = `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="avatar">`;

    showToast('success', 'Avatar Updated! 🎉', 'Your new photo is now visible everywhere.');
  };

  input.click();
};
  </script>
